name: 🚀 CI + Deploy

on:
  push:
    branches:
      - main

jobs:
  ci:
    name: 🔍 Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm run test:ci

      - name: 🏗️ Build project
        run: npm run build

  deploy:
    name: 🚀 Deploy to VPS
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          script: |
            set -e
            cd /home/adriano/DevMaker3D_02_26
            git fetch origin
            git reset --hard origin/main
            docker compose down
            docker compose up -d --build
            echo "✅ Deploy finalizado!"