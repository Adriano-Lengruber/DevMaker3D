version: '3.8'

services:
  devmaker3d:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devmaker3d
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
    networks:
      - nginx-proxy_default
    restart: unless-stopped

networks:
  nginx-proxy_default:
    external: true
